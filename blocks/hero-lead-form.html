<section class="cp-hero" id="inicio" data-block="hero-lead-form" data-landing-key="{{LANDING_KEY}}">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <div class="cp-hero__content">
    <p class="cp-hero__eyebrow">{{COURSE_MODALITY}} · {{COURSE_LOCATION}}</p>
    <h1>{{COURSE_TITLE}}</h1>
    <p class="cp-hero__subtitle">{{COURSE_SUBTITLE}}</p>
    <p class="cp-hero__description">{{COURSE_DESCRIPTION}}</p>

    <ul class="cp-hero__trust" aria-label="Beneficios principales">
      <li>Diploma certificado</li>
      <li>Curso práctico</li>
      <li>Soporte de coordinación</li>
    </ul>
  </div>

  <aside class="cp-hero__form-card" id="registro" aria-label="Formulario de inscripción">
    <h2>{{START_LABEL}}</h2>
    <p>{{START_TEXT}}</p>

    <form id="zoho-native-form" action="/api/forms/lead" method="POST" accept-charset="UTF-8" class="cp-lead-form">
      <input type="hidden" name="zf_referrer_name" id="zf_referrer_name" value="">
      <input type="hidden" name="zf_redirect_url" id="zf_redirect_url" value="">
      <input type="hidden" name="zc_gad" id="zc_gad" value="">

      <div class="cp-hp" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
        <label for="hp_field">No llenar</label>
        <input id="hp_field" type="text" name="hp_field" value="" tabindex="-1" autocomplete="off">
      </div>

      <input type="hidden" name="utm_source" id="utm_source" value="">
      <input type="hidden" name="utm_medium" id="utm_medium" value="">
      <input type="hidden" name="utm_campaign" id="utm_campaign" value="">
      <input type="hidden" name="utm_term" id="utm_term" value="">
      <input type="hidden" name="utm_content" id="utm_content" value="">
      <input type="hidden" name="utm_id" id="utm_id" value="">
      <input type="hidden" name="gclid" id="gclid" value="">
      <input type="hidden" name="gbraid" id="gbraid" value="">
      <input type="hidden" name="wbraid" id="wbraid" value="">
      <input type="hidden" name="fbclid" id="fbclid" value="">
      <input type="hidden" name="msclkid" id="msclkid" value="">
      <input type="hidden" name="li_fat_id" id="li_fat_id" value="">
      <input type="hidden" name="ttclid" id="ttclid" value="">

      <input type="hidden" name="client_id" id="client_id" value="">
      <input type="hidden" name="session_id" id="session_id" value="">
      <input type="hidden" name="lead_event_id" id="lead_event_id" value="">
      <input type="hidden" name="landing_url" id="landing_url" value="">
      <input type="hidden" name="referente" id="referente" value="">
      <input type="hidden" name="dispositivo" id="dispositivo" value="">
      <input type="hidden" name="user_agent" id="user_agent" value="">
      <input type="hidden" name="page_title" id="page_title" value="">
      <input type="hidden" name="user_language" id="user_language" value="">
      <input type="hidden" name="timezone" id="timezone" value="">
      <input type="hidden" name="tiempo_pagina" id="tiempo_pagina" value="">

      <input type="hidden" name="landing_fuente" id="landing_fuente" value="{{LANDING_KEY}}">
      <input type="hidden" name="curso_interesado" id="curso_interesado" value="{{COURSE_TITLE}}">
      <input type="hidden" name="tipo_modalidad" id="tipo_modalidad" value="{{COURSE_MODALITY}}">
      <input type="hidden" name="landing_code" id="landing_code" value="{{LANDING_CODE}}">

      <input type="hidden" name="capture_date" id="capture_date" value="">
      <input type="hidden" name="capture_hours" id="capture_hours" value="">
      <input type="hidden" name="capture_minutes" id="capture_minutes" value="">
      <input type="hidden" name="capture_meridiem" id="capture_meridiem" value="">

      <label for="lead_name">Nombre</label>
      <input id="lead_name" name="lead_name" type="text" maxlength="255" required placeholder="Tu nombre">

      <label for="lead_email">Email</label>
      <input id="lead_email" name="lead_email" type="email" maxlength="255" required placeholder="tu@correo.cl">

      <label for="lead_phone">WhatsApp</label>
      <input id="lead_phone" name="lead_phone" type="tel" maxlength="20" required placeholder="9 1234 5678">

      <label for="lead_notes">Dudas o comentarios</label>
      <textarea id="lead_notes" name="lead_notes" maxlength="1000" placeholder="Horarios, pagos, empresa, SENCE, etc."></textarea>

      <div class="cf-turnstile" data-sitekey="{{PUBLIC_TURNSTILE_SITEKEY}}" data-theme="light" data-appearance="interaction-only"></div>

      <button type="submit" class="cp-button cp-button--primary">{{SUBMIT_TEXT}}</button>
    </form>
  </aside>
</section>
