<section id="infraestructura" class="block-infrastructure" aria-labelledby="infraestructura-title">
  <style>
    .block-infrastructure { max-width: 1200px; margin: 80px auto; padding: 40px 20px; font-family: Arial, sans-serif; }
    .block-infrastructure h2 { margin-bottom: 12px; font-size: 2rem; color: #073763; }
    .block-infrastructure p { margin-bottom: 32px; color: #475569; line-height: 1.7; }
    .infra-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-bottom: 30px; }
    .infra-card { position: relative; overflow: hidden; border-radius: 24px; background: #ffffff; border: 1px solid #e2e8f0; }
    .infra-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .infra-badge { position: absolute; left: 20px; bottom: 20px; background: rgba(15, 75, 182, 0.9); color: white; padding: 10px 16px; border-radius: 999px; font-size: 0.85rem; }
    .infra-features { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
    .infra-feature { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 18px; padding: 22px; color: #0f172a; }
    .infra-feature strong { display: block; margin-bottom: 8px; color: #0f4bb6; }
    @media (max-width: 900px) { .infra-grid { grid-template-columns: 1fr; } .infra-features { grid-template-columns: 1fr; } }
  </style>

  <div class="block-content">
    <h2 id="infraestructura-title">{{INFRASTRUCTURE_TITLE}}</h2>
    <p>{{INFRASTRUCTURE_DESCRIPTION}}</p>

    <div class="infra-grid">
      <div class="infra-card">
        <img src="{{INFRA_IMG_1}}" alt="{{INFRA_IMG_1_ALT}}">
        <span class="infra-badge">{{INFRA_BADGE_1}}</span>
      </div>
      <div class="infra-card">
        <img src="{{INFRA_IMG_2}}" alt="{{INFRA_IMG_2_ALT}}">
        <span class="infra-badge">{{INFRA_BADGE_2}}</span>
      </div>
      <div class="infra-card" style="grid-column: span 2;">
        <img src="{{INFRA_IMG_3}}" alt="{{INFRA_IMG_3_ALT}}">
        <span class="infra-badge">{{INFRA_BADGE_3}}</span>
      </div>
    </div>

    <div class="infra-features">
      <div class="infra-feature">
        <strong>{{INFRA_FEATURE_LABEL_1}}</strong>
        <p>{{INFRA_FEATURE_DESC_1}}</p>
      </div>
      <div class="infra-feature">
        <strong>{{INFRA_FEATURE_LABEL_2}}</strong>
        <p>{{INFRA_FEATURE_DESC_2}}</p>
      </div>
      <div class="infra-feature">
        <strong>{{INFRA_FEATURE_LABEL_3}}</strong>
        <p>{{INFRA_FEATURE_DESC_3}}</p>
      </div>
    </div>
  </div>
</section>
